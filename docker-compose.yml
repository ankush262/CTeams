# Docker Compose configuration for MeetMind
# Defines three services: Redis, Core API, and Web Dashboard
# All services are connected via meetmind-network for inter-service communication

services:
  # Redis service - In-memory data structure store for caching and session management
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - meetmind-network

  # Core API service - FastAPI backend, handles business logic and WebSocket connections
  core-api:
    build: ./services/core-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./services/core-api:/app
    depends_on:
      redis:
        condition: service_started
    networks:
      - meetmind-network

  # Web Dashboard service - Next.js frontend dashboard
  web-dashboard:
    build: ./services/web-dashboard
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./services/web-dashboard:/app
      - /app/node_modules  # Exclude node_modules from bind mount for proper dependency management
    depends_on:
      - core-api
    networks:
      - meetmind-network

# Isolated network so services can reach each other by service name (e.g. mongo, redis).
networks:
  meetmind-network:
    driver: bridge
