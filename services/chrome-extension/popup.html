<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Meeting Intelligence</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 330px;
        padding: 16px;
        font-family: "Segoe UI", "Trebuchet MS", sans-serif;
        background: radial-gradient(circle at top right, #173349 0%, #0f1c2a 70%);
        color: #eef5ff;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 16px;
        letter-spacing: 0.2px;
      }
      p {
        margin: 0 0 12px;
        color: #bed3ee;
        font-size: 12px;
        line-height: 1.4;
      }
      .stack { display: grid; gap: 8px; }
      input, button {
        width: 100%;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        font-size: 12px;
      }
      input {
        background: rgba(255, 255, 255, 0.08);
        color: #ffffff;
        padding: 9px 10px;
      }
      button {
        padding: 10px;
        cursor: pointer;
        color: #0c1a27;
        font-weight: 700;
      }
      #startBtn { background: #8de6af; }
      #stopBtn { background: #ffd08d; display: none; }
      #exportBtn { background: #a7d8ff; }
      #clearDebtBtn { background: #ffc7c7; }
      #saveWsBtn { background: #d4c8ff; }
      #status {
        margin-top: 10px;
        font-size: 12px;
        color: #b9cdeb;
      }
      #stats {
        margin-top: 8px;
        font-size: 11px;
        color: #93afcf;
      }
    </style>
  </head>
  <body>
    <h1>Meeting Intelligence</h1>
    <p>Demo mode: predefined dialogue appears every 5-7 seconds, then summary, tasks, and notes are generated automatically.</p>

    <div class="stack">
      <input id="wsInput" placeholder="ws://localhost:8000" />
      <button id="saveWsBtn">Save WebSocket Endpoint</button>
      <button id="startBtn">Start Intelligence</button>
      <button id="stopBtn">Stop Intelligence</button>
      <button id="exportBtn">Export Last Debrief JSON</button>
      <button id="clearDebtBtn">Clear Cross-Meeting Debt Log</button>
    </div>

    <div id="status">Idle.</div>
    <div id="stats">0 lines • 0 open tasks • 0 done tasks • 0 visuals</div>

    <script src="popup.js"></script>
  </body>
</html>
